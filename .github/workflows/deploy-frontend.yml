name: Deploy Frontend to AWS (SSM)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'front_despacho/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  FRONTEND_INSTANCE_ID: ${{ secrets.FRONTEND_INSTANCE_ID }}
  FRONTEND_APP_DIR: /home/ec2-user/frontend

# Definimos las tareas o trabajos (jobs) del pipeline
jobs:
  # Primer trabajo: Compilar la aplicación React y subir la imagen a Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Descargamos el código de nuestro repositorio de GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuramos la herramienta Buildx de Docker para compilar
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Iniciamos sesión en Docker Hub usando nuestros secretos guardados
      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Compilamos y subimos la imagen del Frontend (React + Nginx)
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:1.0.${{ github.run_number }}

  # Segundo trabajo: Desplegar los contenedores en nuestra instancia EC2 de AWS
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Descargamos el código para tener los archivos a mano
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuramos las credenciales temporales de AWS Academy en el servidor de GitHub
      - name: Configure AWS credentials
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF
          
          cat > ~/.aws/config << EOF
          [default]
          region=${{ env.AWS_REGION }}
          output=json
          EOF

      # Generamos el archivo docker-compose.yml dinámicamente y lo convertimos a Base64
      - name: Generate docker-compose.yml
        run: |
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          services:
            frontend:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
              container_name: frontend_container
              restart: always
              ports:
                - '80:80'
              environment:
                - BACKEND_VENTAS_IP=${{ secrets.BACKEND_PRIVATE_IP }}
                - BACKEND_DESPACHOS_IP=${{ secrets.BACKEND_PRIVATE_IP }}
          EOF
          echo "FRONTEND_COMPOSE_B64=$(base64 -w 0 docker-compose.yml)" >> $GITHUB_ENV

      - name: Deploy frontend via SSM
        run: |
          aws ssm send-command \
            --region "${{ env.AWS_REGION }}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ env.FRONTEND_INSTANCE_ID }}" \
            --parameters commands="[
              \"# 1. Instalar Docker si no esta presente\",
              \"if ! command -v docker &> /dev/null; then\",
              \"  sudo dnf update -y || sudo yum update -y\",
              \"  sudo dnf install docker -y || sudo yum install docker -y\",
              \"  sudo systemctl start docker\",
              \"  sudo systemctl enable docker\",
              \"  sudo usermod -aG docker ec2-user\",
              \"fi\",
              \"# 2. Instalar Docker Compose si no esta presente\",
              \"if ! docker compose version &> /dev/null; then\",
              \"  sudo mkdir -p /usr/libexec/docker/cli-plugins\",
              \"  sudo curl -L \\\"https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64\\\" -o /usr/libexec/docker/cli-plugins/docker-compose\",
              \"  sudo chmod +x /usr/libexec/docker/cli-plugins/docker-compose\",
              \"fi\",
              \"# 3. Crear directorio de la app y escribir docker-compose.yml\",
              \"sudo mkdir -p ${{ env.FRONTEND_APP_DIR }}\",
              \"echo '${{ env.FRONTEND_COMPOSE_B64 }}' | base64 -d | sudo tee ${{ env.FRONTEND_APP_DIR }}/docker-compose.yml > /dev/null\",
              \"# 4. Asegurar permisos correctos de ec2-user\",
              \"sudo chown -R ec2-user:ec2-user ${{ env.FRONTEND_APP_DIR }}\",
              \"# 5. Descargar nuevas imagenes y ejecutar\",
              \"cd ${{ env.FRONTEND_APP_DIR }}\",
              \"sudo docker compose pull\",
              \"sudo docker compose up -d\"
            ]"
